<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lift Log">
<meta name="theme-color" content="#080808">
<title>Lift Log</title>
<style>
:root{
  --g:#22C880;--gbg:rgba(34,200,128,.08);--gborder:rgba(34,200,128,.22);
  --r:#FF5A52;--y:#F5C842;
  --bg:#080808;--s:#111;--s2:#181818;--s3:#202020;--s4:#282828;
  --b:rgba(255,255,255,.06);--b2:rgba(255,255,255,.11);--b3:rgba(255,255,255,.18);
  --t:#EFEFEF;--t2:#999;--t3:#555;--t4:#333;
  --rad:14px;--rads:9px;--radxs:6px;
  
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;height:100dvh;background:var(--bg);color:var(--t);font-family:var(--font);font-size:15px;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
body{overflow:hidden}
::-webkit-scrollbar{width:0;height:0}

/* NAV */
.app-shell{display:flex;flex-direction:column;height:100%;height:100dvh}
.tab-bar{display:flex;background:rgba(8,8,8,.96);border-top:1px solid var(--b);padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px));flex-shrink:0;position:relative;z-index:100}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;border:none;background:none;color:var(--t3)}
.tab.active{color:var(--g)}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab span{font-size:10px;font-weight:500;letter-spacing:.02em}
.pages{flex:1;min-height:0;position:relative;overflow:hidden}
.page.active{display:flex}
.page{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;-webkit-overflow-scrolling:touch}
.page.active{display:flex}

/* HOME */
#p-home{padding:0 0 calc(80px + env(safe-area-inset-bottom,0px))}
.home-header{padding:calc(20px + env(safe-area-inset-top,0px)) 16px 16px;display:flex;align-items:center;justify-content:space-between}
.home-title{font-size:22px;font-weight:700;letter-spacing:-.4px}
.home-date{font-size:12px;color:var(--t2);margin-top:2px}
.home-avatar{width:36px;height:36px;border-radius:50%;background:var(--gbg);border:1px solid var(--gborder);display:flex;align-items:center;justify-content:center}
.home-avatar svg{width:18px;height:18px;stroke:var(--g);fill:none;stroke-width:1.8;stroke-linecap:round}
.day-row{display:flex;gap:8px;padding:0 16px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.day-chip{flex-shrink:0;padding:10px 14px;border-radius:99px;border:1px solid var(--b2);background:var(--s);font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;white-space:nowrap}
.day-chip:active{opacity:.7}
.day-chip.today{border-color:var(--g);background:var(--gbg);color:var(--g)}
.day-chip.rest{opacity:.35;pointer-events:none}
.section-head{padding:0 16px 10px;font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em}
.ex-list{display:flex;flex-direction:column;gap:8px;padding:0 16px}

/* EXERCISE CARD */
.exc{background:var(--s);border:1px solid var(--b);border-radius:var(--rad);overflow:hidden}
.exc.logged{border-color:var(--gborder)}
.exc-head{padding:13px 14px 0;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.exc-name{font-size:14px;font-weight:600;line-height:1.3;flex:1}
.exc-opt{font-size:11px;color:var(--t3);font-weight:400}
.hist-btn{padding:5px 10px;border-radius:var(--radxs);background:var(--s2);border:1px solid var(--b2);font-size:11px;font-weight:500;color:var(--t2);cursor:pointer;white-space:nowrap;font-family:var(--font)}
.hist-btn.open{background:var(--gbg);border-color:var(--gborder);color:var(--g)}

/* BASELINE */
.baseline{display:flex;gap:6px;padding:0 14px 10px}
.bl{flex:1;background:var(--s2);border-radius:var(--radxs);padding:8px 6px;text-align:center}
.bl-l{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.bl-v{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--t2);margin-top:2px}
.bl-d{font-size:9px;color:var(--t3);margin-top:1px}

/* INPUTS */
.trio{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:0 14px 10px}
.field label{display:block;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.field input{height:48px;width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rads);color:var(--t);font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;text-align:center;-webkit-appearance:none;appearance:none}
.field input:focus{outline:none;border-color:var(--g);background:var(--gbg)}
.field input::placeholder{color:var(--t4);font-size:14px;font-weight:400}

/* TREND SPARK */
.trend-row{display:flex;align-items:center;gap:6px;padding:0 14px 12px}
.trend-label{font-size:11px;color:var(--t3)}
.trend-val{font-size:11px;font-weight:600}
.trend-val.up{color:var(--g)}.trend-val.dn{color:var(--r)}.trend-val.eq{color:var(--t2)}

/* SAVE */
.save-area{display:flex;align-items:center;justify-content:space-between;padding:0 14px 14px}
.saved-lbl{font-size:12px;color:var(--g);display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .2s}
.saved-lbl.show{opacity:1}
.save-btn{padding:10px 24px;background:var(--g);border:none;border-radius:var(--rads);color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)}
.save-btn:active{opacity:.75}
.save-btn.upd{background:var(--s3);color:var(--t2);border:1px solid var(--b2)}

/* HISTORY PANEL */
.hist-panel{border-top:1px solid var(--b);padding:12px 14px;display:none;flex-direction:column;gap:10px}
.hist-panel.open{display:flex}
.hist-title{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.hist-rows{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto}
.hist-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--s2);border-radius:var(--radxs)}
.hr-date{font-size:11px;color:var(--t3);width:52px;flex-shrink:0}
.hr-stats{flex:1;display:flex;gap:10px}
.hr-stat{font-size:12px;font-variant-numeric:tabular-nums}
.hr-stat span{color:var(--t3);font-size:10px}
.hr-delta{font-size:11px;font-weight:600;margin-left:auto;flex-shrink:0}
.hr-delta.up{color:var(--g)}.hr-delta.dn{color:var(--r)}.hr-delta.eq{color:var(--t3)}
.chart-area{position:relative;height:110px}
.nodata{font-size:12px;color:var(--t3);padding:4px 0}

/* ADD EX */
.add-ex-wrap{padding:0 16px;margin-top:4px}
.add-ex-btn{width:100%;padding:14px;background:transparent;border:1px dashed var(--b3);border-radius:var(--rad);color:var(--t2);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font)}
.add-ex-btn:active{background:var(--s)}
.add-ex-form{background:var(--s);border:1px solid var(--gborder);border-radius:var(--rad);padding:14px;display:none;flex-direction:column;gap:10px;margin-top:8px}
.add-ex-form.open{display:flex}
.add-ex-form input{height:46px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--rads);color:var(--t);font-size:15px;padding:0 12px;width:100%;font-family:var(--font)}
.add-ex-form input:focus{outline:none;border-color:var(--g)}
.form-btns{display:flex;gap:8px}
.f-cancel{flex:1;padding:12px;background:var(--s2);border:1px solid var(--b);border-radius:var(--rads);color:var(--t2);font-size:14px;cursor:pointer;font-family:var(--font)}
.f-confirm{flex:1;padding:12px;background:var(--g);border:none;border-radius:var(--rads);color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font)}

/* AI CHAT */
#p-ai{padding-bottom:0}
.chat-header{padding:calc(20px + env(safe-area-inset-top,0px)) 16px 14px;border-bottom:1px solid var(--b);flex-shrink:0}
.chat-header h2{font-size:18px;font-weight:700;letter-spacing:-.3px}
.chat-header p{font-size:12px;color:var(--t2);margin-top:3px}
.chat-messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:85%;display:flex;flex-direction:column;gap:3px}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.ai{align-self:flex-start;align-items:flex-start}
.msg-bubble{padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.5}
.msg.user .msg-bubble{background:var(--g);color:#000;border-bottom-right-radius:4px;font-weight:500}
.msg.ai .msg-bubble{background:var(--s2);color:var(--t);border-bottom-left-radius:4px;border:1px solid var(--b2)}
.msg.ai .msg-bubble.thinking{color:var(--t3);font-style:italic}
.msg-time{font-size:10px;color:var(--t3)}
.chat-input-area{border-top:1px solid var(--b);padding:10px 14px calc(10px + env(safe-area-inset-bottom,0px));display:flex;gap:8px;background:var(--bg);flex-shrink:0}
.chat-input{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:99px;color:var(--t);font-size:15px;padding:10px 16px;font-family:var(--font);resize:none;min-height:42px;max-height:100px;line-height:1.4}
.chat-input:focus{outline:none;border-color:var(--g)}
.chat-send{width:42px;height:42px;border-radius:50%;background:var(--g);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.chat-send:active{opacity:.75}
.chat-send svg{width:18px;height:18px;stroke:#000;fill:none;stroke-width:2.5;stroke-linecap:round}
.chat-send:disabled{background:var(--s3);cursor:not-allowed}
.chat-send:disabled svg{stroke:var(--t3)}
.quick-chips{display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto;flex-shrink:0}
.qchip{flex-shrink:0;padding:7px 12px;border-radius:99px;background:var(--s2);border:1px solid var(--b2);font-size:12px;color:var(--t2);cursor:pointer;white-space:nowrap;font-family:var(--font)}
.qchip:active{background:var(--s3)}

/* HISTORY PAGE */
#p-history{padding:0 0 calc(80px + env(safe-area-inset-bottom,0px))}
.hist-header{padding:calc(20px + env(safe-area-inset-top,0px)) 16px 16px}
.hist-header h2{font-size:22px;font-weight:700;letter-spacing:-.4px}
.hist-filter{display:flex;gap:8px;padding:0 16px 16px;overflow-x:auto}
.hf-chip{flex-shrink:0;padding:7px 14px;border-radius:99px;background:var(--s);border:1px solid var(--b2);font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;white-space:nowrap}
.hf-chip.active{border-color:var(--g);background:var(--gbg);color:var(--g)}
.hist-section{margin:0 16px 20px}
.hist-section-title{font-size:13px;font-weight:600;color:var(--t);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--b)}
.all-hist-chart{height:160px;position:relative;margin-bottom:12px}
.hist-entry{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s);border:1px solid var(--b);border-radius:var(--rads);margin-bottom:6px}
.he-date{font-size:11px;color:var(--t3);width:44px;flex-shrink:0}
.he-bars{flex:1;display:flex;gap:10px;flex-wrap:wrap}
.he-stat{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
.he-stat-l{font-size:10px;color:var(--t3);display:block;font-weight:400}
.he-delta{font-size:12px;font-weight:600;flex-shrink:0}
.he-delta.up{color:var(--g)}.he-delta.dn{color:var(--r)}.he-delta.eq{color:var(--t3)}
.empty-state{text-align:center;padding:40px 20px;color:var(--t3);font-size:14px}
</style>
</head>
<body>
<div class="app-shell">
  <div class="pages">

    <!-- HOME / WORKOUT -->
    <div class="page active" id="p-home">
      <div class="home-header">
        <div>
          <div class="home-title" id="homeTitle">Lift Log</div>
          <div class="home-date" id="homeDate"></div>
        </div>
        <div class="home-avatar"><svg viewBox="0 0 24 24"><path d="M6 4v16M18 4v16M2 8h4M18 8h4M2 16h4M18 16h4"/></svg></div>
      </div>
      <div class="day-row" id="dayRow"></div>
      <div class="section-head" id="exSecLabel">Exercises</div>
      <div class="ex-list" id="exList"></div>
      <div class="add-ex-wrap" id="addExWrap"></div>
    </div>

    <!-- HISTORY -->
    <div class="page" id="p-history">
      <div class="hist-header"><h2>History</h2></div>
      <div class="hist-filter" id="histFilter"></div>
      <div id="histContent" style="padding:0 16px"></div>
    </div>

    <!-- AI COACH -->
    <div class="page" id="p-ai">
      <div class="chat-header">
        <h2>AI Coach</h2>
        <p>Ask anything about your training</p>
      </div>
      <div class="quick-chips" id="quickChips"></div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <textarea class="chat-input" id="chatInput" placeholder="Ask your coach..." rows="1"></textarea>
        <button class="chat-send" id="chatSend">
          <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>

  </div>

  <div class="tab-bar">
    <button class="tab active" data-page="p-home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Workout</span>
    </button>
    <button class="tab" data-page="p-history">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>History</span>
    </button>
    <button class="tab" data-page="p-ai">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 110 20A10 10 0 0112 2z"/><path d="M12 16v-4M12 8h.01"/></svg>
      <span>AI Coach</span>
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var SPLIT={
  1:{name:"Leg Day",   ex:["Goblet squats","Leg press","RDL","Reverse lunges","Calf raises"],opt:[]},
  2:{name:"Pull Day",  ex:["Lat pulls","Mid row","Face pulls","Lateral raise + Front raise","Hammer curls","Bicep curls"],opt:[]},
  3:null,
  4:{name:"Leg Day",   ex:["Sumo squats","Bulgarian split squats","Hamstring curls","RDL","Calf raises"],opt:[]},
  5:{name:"Push Day",  ex:["Chest press","Incline chest press","Shoulder press","Overhead tricep extension","Tricep kickbacks"],opt:["Tricep kickbacks"]},
  6:null,0:null
};
var DN=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var DF=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
var MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmt(d){return MN[d.getMonth()]+" "+d.getDate()}
function fmt2(d){return(d.getMonth()+1)+"/"+(d.getDate())}
function fmtFull(d){return MN[d.getMonth()]+" "+d.getDate()+", "+(d.getFullYear())}

// ── STORAGE ───────────────────────────────────────────────────────────────────
// Key: ol_e_{dow}_{dateISO} => {w,r,s}
function dateISO(d){return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()}
function exKey(dow,dateStr,ex){return"olt_"+dow+"_"+dateStr+"_"+ex.replace(/\W+/g,"_")}
function saveEntry(dow,date,ex,val){try{localStorage.setItem(exKey(dow,dateISO(date),ex),JSON.stringify(val))}catch(e){}}
function getEntry(dow,date,ex){try{return JSON.parse(localStorage.getItem(exKey(dow,dateISO(date),ex))||"null")}catch(e){return null}}

function getAllEntries(dow,ex){
  var results=[];
  try{
    var prefix="olt_"+dow+"_";
    for(var i=0;i<localStorage.length;i++){
      var k=localStorage.key(i);
      if(k&&k.startsWith(prefix)){
        var parts=k.split("_");
        // key format: olt_{dow}_{year}_{month}_{day}_{exname...}
        // We need to reconstruct: after "olt_dow_" the next parts are date ISO then ex
        var rest=k.slice(prefix.length);
        var exSuffix="_"+ex.replace(/\W+/g,"_");
        if(rest.indexOf(exSuffix)>=0){
          var dateStr=rest.slice(0,rest.length-exSuffix.length);
          var dateParts=dateStr.split("-");
          if(dateParts.length===3){
            var d=new Date(parseInt(dateParts[0]),parseInt(dateParts[1])-1,parseInt(dateParts[2]));
            var val=JSON.parse(localStorage.getItem(k)||"null");
            if(val)results.push({date:d,dateStr:dateStr,val:val});
          }
        }
      }
    }
  }catch(e){}
  results.sort(function(a,b){return a.date-b.date});
  return results;
}

function getCustomEx(dow){try{return JSON.parse(localStorage.getItem("olt_cx_"+dow)||"[]")}catch(e){return[]}}
function saveCustomEx(dow,a){try{localStorage.setItem("olt_cx_"+dow,JSON.stringify(a))}catch(e){}}

// Compute the date that corresponds to a given DOW in the "current" or past week
function dateForDow(dow,weekOffset){
  var n=new Date,td=n.getDay();
  var diff=(dow-td+7)%7;
  var d=new Date(n);
  d.setDate(n.getDate()+diff+weekOffset*7);
  d.setHours(0,0,0,0);
  return d;
}
function lastSameDow(dow){return dateForDow(dow,-1)}
function thisSameDow(dow){return dateForDow(dow,0)}

// ── STATE ─────────────────────────────────────────────────────────────────────
var activeDow=new Date().getDay();
if(!SPLIT[activeDow]){var cands=[1,2,4,5];activeDow=cands.find(function(d){return d>new Date().getDay()})||1}
var activeCharts={};
var histCharts={};
var chatHistory=[];
var histFilterDow=null;

// ── TABS ──────────────────────────────────────────────────────────────────────
document.querySelectorAll(".tab").forEach(function(tab){
  tab.addEventListener("click",function(){
    var pid=tab.dataset.page;
    document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});
    tab.classList.add("active");
    document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");p.style.display=""});
    var pg=document.getElementById(pid);
    pg.classList.add("active");
    if(pid==="p-history")renderHistory();
    if(pid==="p-ai")initAI();
  });
});

// ── HOME ──────────────────────────────────────────────────────────────────────
function buildHome(){
  var now=new Date();
  document.getElementById("homeDate").textContent=DF[now.getDay()]+", "+fmt(now);
  var row=document.getElementById("dayRow");row.innerHTML="";
  [1,2,3,4,5].forEach(function(d){
    var sp=SPLIT[d];
    var chip=document.createElement("button");chip.className="day-chip"+(d===activeDow?" today":"")+(sp?"":" rest");
    chip.textContent=(sp?sp.name:DN[d]+" Rest");
    if(sp)chip.addEventListener("click",function(){activeDow=d;buildHome()});
    row.appendChild(chip);
  });
  var sp=SPLIT[activeDow];
  document.getElementById("exSecLabel").textContent=sp?sp.name+" – "+fmt(thisSameDow(activeDow)):"Rest day";
  var cx=getCustomEx(activeDow);
  var allEx=sp?sp.ex.concat(cx):cx;
  var list=document.getElementById("exList");list.innerHTML="";
  allEx.forEach(function(ex){list.appendChild(makeExCard(activeDow,ex,sp||{opt:[]}))});
  var aw=document.getElementById("addExWrap");aw.innerHTML="";
  if(sp||true)aw.appendChild(makeAddExSection(activeDow,allEx,sp||{ex:[],opt:[]}));
}

// ── EXERCISE CARD ─────────────────────────────────────────────────────────────
function makeExCard(dow,ex,sp){
  var isOpt=(sp.opt||[]).indexOf(ex)>=0||getCustomEx(dow).indexOf(ex)>=0;
  var today=thisSameDow(dow);
  var lastWeek=lastSameDow(dow);
  var cur=getEntry(dow,today,ex);
  var prev=getEntry(dow,lastWeek,ex);

  var card=document.createElement("div");card.className="exc"+(cur?" logged":"");
  card.id="exc_"+dow+"_"+ex.replace(/\W+/g,"_");

  // Header
  var head=document.createElement("div");head.className="exc-head";
  var nm=document.createElement("div");nm.className="exc-name";nm.textContent=ex;
  if(isOpt){var ot=document.createElement("span");ot.className="exc-opt";ot.textContent=" (optional)";nm.appendChild(ot)}
  var hbtn=document.createElement("button");hbtn.className="hist-btn";hbtn.textContent="History";
  head.appendChild(nm);head.appendChild(hbtn);card.appendChild(head);

  // Baseline - last week
  var bstrip=document.createElement("div");bstrip.className="baseline";
  if(prev){
    [["Last wt",prev.w+" lbs",fmt(lastWeek)],["Last reps",prev.r,null],["Last sets",prev.s,null]].forEach(function(arr){
      var b=document.createElement("div");b.className="bl";
      b.innerHTML='<div class="bl-l">'+arr[0]+'</div><div class="bl-v">'+arr[1]+'</div>'+(arr[2]?'<div class="bl-d">'+arr[2]+"</div>":"");
      bstrip.appendChild(b);
    });
  }else{
    var nb=document.createElement("div");nb.style.cssText="padding:8px 14px;font-size:12px;color:var(--t3)";nb.textContent="No data from last week yet";
    bstrip.appendChild(nb);
  }
  card.appendChild(bstrip);

  // Inputs
  var trio=document.createElement("div");trio.className="trio";
  var ins={};
  [["Weight","lbs","w",cur?cur.w:""],["Reps","reps","r",cur?cur.r:""],["Sets","sets","s",cur?cur.s:""]].forEach(function(arr){
    var f=document.createElement("div");f.className="field";
    var l=document.createElement("label");l.textContent=arr[0];
    var i=document.createElement("input");i.type="number";i.min="0";i.placeholder=arr[1];i.value=arr[3];i.inputMode="decimal";
    ins[arr[2]]=i;f.appendChild(l);f.appendChild(i);trio.appendChild(f);
  });
  card.appendChild(trio);

  // Trend vs last week
  var trow=document.createElement("div");trow.className="trend-row";
  var tlbl=document.createElement("span");tlbl.className="trend-label";tlbl.textContent="vs last week:";
  var tval=document.createElement("span");tval.className="trend-val eq";tval.textContent="—";
  trow.appendChild(tlbl);trow.appendChild(tval);card.appendChild(trow);

  function rfTrend(){
    var w=parseFloat(ins.w.value)||0,r=parseInt(ins.r.value)||0,s=parseInt(ins.s.value)||0;
    if(!prev||!w||!r||!s){tval.textContent="—";tval.className="trend-val eq";return}
    var changes=[];
    var dw=w-prev.w,dr=r-prev.r,ds=s-prev.s;
    if(dw!==0)changes.push((dw>0?"+":"")+dw+" lbs");
    if(dr!==0)changes.push((dr>0?"+":"")+dr+" reps");
    if(ds!==0)changes.push((ds>0?"+":"")+ds+" sets");
    if(changes.length===0){tval.textContent="Same as last week";tval.className="trend-val eq";}
    else{var up=dw>0||dr>0||ds>0;tval.textContent=changes.join(", ");tval.className="trend-val "+(up?"up":"dn");}
  }
  Object.values(ins).forEach(function(i){i.addEventListener("input",rfTrend)});rfTrend();

  // Save
  var sa=document.createElement("div");sa.className="save-area";
  var stag=document.createElement("div");stag.className="saved-lbl"+(cur?" show":"");stag.textContent="✓ Saved";
  var sbtn=document.createElement("button");sbtn.className="save-btn"+(cur?" upd":"");sbtn.textContent=cur?"Update":"Save";
  sbtn.addEventListener("click",function(){
    var w=parseFloat(ins.w.value),r=parseInt(ins.r.value),s=parseInt(ins.s.value);
    if(!w||!r||!s){ins.w.style.borderColor="var(--r)";setTimeout(function(){ins.w.style.borderColor=""},1200);return}
    saveEntry(dow,today,ex,{w:w,r:r,s:s});
    stag.classList.add("show");sbtn.textContent="Update";sbtn.className="save-btn upd";
    card.classList.add("logged");rfTrend();
  });
  sa.appendChild(stag);sa.appendChild(sbtn);card.appendChild(sa);

  // History panel
  var hp=document.createElement("div");hp.className="hist-panel";
  hp.innerHTML='<div class="hist-title">All recorded sessions</div><div class="hist-rows" id="hr_'+dow+"_"+ex.replace(/\W+/g,"_")+'"></div><div class="chart-area" id="hc_'+dow+"_"+ex.replace(/\W+/g,"_")+'"></div>';
  card.appendChild(hp);

  hbtn.addEventListener("click",function(){
    var open=hp.classList.toggle("open");
    hbtn.textContent=open?"Close":"History";hbtn.classList.toggle("open",open);
    if(open)renderHistPanel(dow,ex,hp);
    else{var cid=dow+"_"+ex.replace(/\W+/g,"_");if(activeCharts[cid]){activeCharts[cid].destroy();delete activeCharts[cid]}}
  });
  return card;
}

function renderHistPanel(dow,ex,panel){
  var cid=dow+"_"+ex.replace(/\W+/g,"_");
  var entries=getAllEntries(dow,ex);
  var rEl=document.getElementById("hr_"+cid);
  var cEl=document.getElementById("hc_"+cid);
  rEl.innerHTML="";
  if(entries.length===0){rEl.innerHTML='<div class="nodata">No history yet — save today to start.</div>';cEl.style.display="none";return}
  cEl.style.display="block";

  // Table rows
  for(var i=entries.length-1;i>=0;i--){
    var e=entries[i];
    var prev2=i>0?entries[i-1]:null;
    var dw=prev2?(e.val.w-prev2.val.w):0;
    var dr=prev2?(e.val.r-prev2.val.r):0;
    var row=document.createElement("div");row.className="hist-row";
    var deltaStr=prev2?(dw!==0||dr!==0?((dw>0?"+":(dw<0?"":""))+( dw!==0?(dw+" lbs"):"")+( dw!==0&&dr!==0?", ":"")+( dr!==0?((dr>0?"+":"")+dr+" reps"):"")):("—")):("—");
    var deltaClass=dw>0||dr>0?"up":dw<0||dr<0?"dn":"eq";
    row.innerHTML='<div class="hr-date">'+fmt2(e.date)+'</div><div class="hr-stats"><span class="hr-stat">'+e.val.w+'<span> lbs</span></span><span class="hr-stat">'+e.val.r+'<span> reps</span></span><span class="hr-stat">'+e.val.s+'<span> sets</span></span></div><div class="hr-delta '+deltaClass+'">'+deltaStr+"</div>";
    rEl.appendChild(row);
  }

  // Chart
  if(activeCharts[cid]){try{activeCharts[cid].destroy()}catch(x){}}
  cEl.innerHTML="";var canvas=document.createElement("canvas");cEl.appendChild(canvas);
  var labels=entries.map(function(e){return fmt2(e.date)});
  var wData=entries.map(function(e){return e.val.w});
  activeCharts[cid]=new Chart(canvas,{
    type:"line",data:{labels:labels,datasets:[{label:"Weight (lbs)",data:wData,borderColor:"#22C880",backgroundColor:"rgba(34,200,128,.06)",pointBackgroundColor:"#22C880",pointRadius:4,tension:.3,fill:true,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#1c1c1c",borderColor:"#333",borderWidth:1,bodyColor:"#eee",padding:8,callbacks:{label:function(c){return c.parsed.y+" lbs"}}}},scales:{x:{ticks:{font:{size:10},color:"#555",autoSkip:true,maxTicksLimit:6},grid:{display:false},border:{display:false}},y:{ticks:{font:{size:10},color:"#555"},grid:{color:"rgba(255,255,255,0.04)"},border:{display:false}}}}
  });
}

// ── ADD EXERCISE ──────────────────────────────────────────────────────────────
function makeAddExSection(dow,allEx,sp){
  var wrap=document.createElement("div");wrap.style.marginTop="8px";
  var btn=document.createElement("button");btn.className="add-ex-btn";btn.textContent="+ Add exercise";
  var form=document.createElement("div");form.className="add-ex-form";
  var inp=document.createElement("input");inp.type="text";inp.placeholder="Exercise name...";
  var btns=document.createElement("div");btns.className="form-btns";
  var can=document.createElement("button");can.className="f-cancel";can.textContent="Cancel";
  var conf=document.createElement("button");conf.className="f-confirm";conf.textContent="Add";
  btns.appendChild(can);btns.appendChild(conf);form.appendChild(inp);form.appendChild(btns);
  wrap.appendChild(btn);wrap.appendChild(form);
  btn.addEventListener("click",function(){form.classList.add("open");btn.style.display="none";inp.focus()});
  can.addEventListener("click",function(){form.classList.remove("open");btn.style.display="flex";inp.value=""});
  conf.addEventListener("click",function(){
    var name=inp.value.trim();if(!name)return;
    var cx=getCustomEx(dow);if(cx.indexOf(name)<0&&(sp.ex||[]).indexOf(name)<0){cx.push(name);saveCustomEx(dow,cx)}
    inp.value="";form.classList.remove("open");btn.style.display="flex";buildHome();
  });
  return wrap;
}

// ── HISTORY PAGE ──────────────────────────────────────────────────────────────
function renderHistory(){
  Object.values(histCharts).forEach(function(c){try{c.destroy()}catch(e){}});histCharts={};
  var dow=histFilterDow!==null?histFilterDow:(new Date().getDay());
  if(!SPLIT[dow])dow=[1,2,4,5][0];

  // Filter chips
  var fc=document.getElementById("histFilter");fc.innerHTML="";
  [[null,"All days"],[1,"Mon · Leg"],[2,"Tue · Pull"],[4,"Thu · Leg"],[5,"Fri · Push"]].forEach(function(arr){
    var d=arr[0],lbl=arr[1];
    var chip=document.createElement("div");chip.className="hf-chip";
    chip.textContent=lbl;
    if((histFilterDow===null&&d===null)||(histFilterDow===d))chip.classList.add("active");
    chip.addEventListener("click",function(){histFilterDow=d;renderHistory()});
    fc.appendChild(chip);
  });

  var hc=document.getElementById("histContent");hc.innerHTML="";
  var days=histFilterDow!==null?[histFilterDow]:[1,2,4,5];
  days.forEach(function(d){
    var sp=SPLIT[d];if(!sp)return;
    var cx=getCustomEx(d);
    var allEx=sp.ex.concat(cx);
    var sec=document.createElement("div");sec.className="hist-section";
    var stitle=document.createElement("div");stitle.className="hist-section-title";stitle.textContent=sp.name+" ("+DF[d]+")";sec.appendChild(stitle);

    var hasAny=false;
    allEx.forEach(function(ex){
      var entries=getAllEntries(d,ex);
      if(entries.length===0)return;
      hasAny=true;
      var exSec=document.createElement("div");exSec.style.marginBottom="14px";
      var exLbl=document.createElement("div");exLbl.style.cssText="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px";exLbl.textContent=ex;
      exSec.appendChild(exLbl);

      // Chart
      var chartWrap=document.createElement("div");chartWrap.style.cssText="height:100px;position:relative;margin-bottom:8px;background:var(--s);border-radius:var(--rads);padding:8px";
      var cv=document.createElement("canvas");chartWrap.appendChild(cv);
      exSec.appendChild(chartWrap);
      var cid="hist_"+d+"_"+ex.replace(/\W+/g,"_");
      if(histCharts[cid]){try{histCharts[cid].destroy()}catch(e){}}
      histCharts[cid]=new Chart(cv,{
        type:"line",data:{labels:entries.map(function(e){return fmt2(e.date)}),datasets:[
          {label:"Weight",data:entries.map(function(e){return e.val.w}),borderColor:"#22C880",backgroundColor:"transparent",pointRadius:3,tension:.3,borderWidth:2,yAxisID:"y"},
          {label:"Reps",data:entries.map(function(e){return e.val.r}),borderColor:"#F5C842",backgroundColor:"transparent",pointRadius:3,tension:.3,borderWidth:1.5,borderDash:[4,2],yAxisID:"y2"}
        ]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:"#666",font:{size:10},boxWidth:10,padding:8}}},scales:{x:{ticks:{font:{size:9},color:"#444",autoSkip:true,maxTicksLimit:5},grid:{display:false},border:{display:false}},y:{ticks:{font:{size:9},color:"#444"},grid:{color:"rgba(255,255,255,0.03)"},border:{display:false},position:"left"},y2:{ticks:{font:{size:9},color:"#666"},grid:{display:false},border:{display:false},position:"right"}}}
      });

      // Entry rows (last 5)
      var recent=entries.slice(-5).reverse();
      recent.forEach(function(e,idx){
        var prev2=idx<recent.length-1?recent[idx+1]:null;
        var row=document.createElement("div");row.className="hist-entry";
        var dw=prev2?(e.val.w-prev2.val.w):0,dr=prev2?(e.val.r-prev2.val.r):0;
        var dcls=dw>0||dr>0?"up":dw<0||dr<0?"dn":"eq";
        var dstr=prev2?(dw!==0?((dw>0?"+":"")+dw+" lbs"):(dr!==0?((dr>0?"+":"")+dr+" reps"):"—")):"first";
        row.innerHTML='<div class="he-date">'+fmt2(e.date)+'</div><div class="he-bars"><div class="he-stat">'+e.val.w+'<span class="he-stat-l">lbs</span></div><div class="he-stat">'+e.val.r+'<span class="he-stat-l">reps</span></div><div class="he-stat">'+e.val.s+'<span class="he-stat-l">sets</span></div></div><div class="he-delta '+dcls+'">'+dstr+"</div>";
        exSec.appendChild(row);
      });
      sec.appendChild(exSec);
    });
    if(!hasAny){var em=document.createElement("div");em.className="empty-state";em.textContent="No sessions logged yet.";sec.appendChild(em)}
    hc.appendChild(sec);
  });
}

// ── AI COACH ──────────────────────────────────────────────────────────────────
var aiInited=false;
function initAI(){
  if(aiInited)return;aiInited=true;
  var chips=document.getElementById("quickChips");
  var qs=["Analyze my progress","What should I increase?","Suggest exercise variations","How am I progressing on squats?","Am I overtraining?","Give me a weekly summary"];
  qs.forEach(function(q){
    var c=document.createElement("button");c.className="qchip";c.textContent=q;
    c.addEventListener("click",function(){sendAI(q)});
    chips.appendChild(c);
  });
  addMsg("ai","Hey! I'm your AI coach. I have access to all your workout history. Ask me anything about your training, progress, or for suggestions on what to improve. 💪");
  document.getElementById("chatSend").addEventListener("click",function(){
    var v=document.getElementById("chatInput").value.trim();if(v)sendAI(v);
  });
  document.getElementById("chatInput").addEventListener("keydown",function(e){
    if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();var v=this.value.trim();if(v)sendAI(v)}
  });
}

function addMsg(role,text){
  var msgs=document.getElementById("chatMessages");
  var wrap=document.createElement("div");wrap.className="msg "+role;
  var bubble=document.createElement("div");bubble.className="msg-bubble";bubble.textContent=text;
  var time=document.createElement("div");time.className="msg-time";
  var now=new Date();time.textContent=now.getHours()+":"+(now.getMinutes()<10?"0":"")+now.getMinutes();
  wrap.appendChild(bubble);wrap.appendChild(time);msgs.appendChild(wrap);
  msgs.scrollTop=msgs.scrollHeight;
  return bubble;
}

function buildWorkoutContext(){
  var ctx="USER WORKOUT DATA:\nSplit: Mon=Leg Day, Tue=Pull Day, Wed=Rest, Thu=Leg Day, Fri=Push Day\n\n";
  [1,2,4,5].forEach(function(dow){
    var sp=SPLIT[dow];if(!sp)return;
    ctx+=DF[dow]+" ("+sp.name+"):\n";
    var cx=getCustomEx(dow);
    sp.ex.concat(cx).forEach(function(ex){
      var entries=getAllEntries(dow,ex);
      if(entries.length===0){ctx+="  "+ex+": no data yet\n";return}
      ctx+="  "+ex+":\n";
      entries.slice(-8).forEach(function(e){
        ctx+="    "+fmtFull(e.date)+": "+e.val.w+"lbs x "+e.val.r+" reps x "+e.val.s+" sets\n";
      });
      var last=entries[entries.length-1];
      var prev=entries.length>1?entries[entries.length-2]:null;
      if(prev){var dw=last.val.w-prev.val.w;var dr=last.val.r-prev.val.r;ctx+="    Latest change: weight "+(dw>=0?"+":"")+dw+"lbs, reps "+(dr>=0?"+":"")+dr+"\n"}
    });
  });
  return ctx;
}

function sendAI(text){
  document.getElementById("chatInput").value="";
  addMsg("user",text);
  var sendBtn=document.getElementById("chatSend");sendBtn.disabled=true;
  var thinkBubble=addMsg("ai","...");thinkBubble.classList.add("thinking");
  chatHistory.push({role:"user",content:text});

  var workoutCtx=buildWorkoutContext();
  var systemPrompt="You are a knowledgeable, encouraging personal trainer and strength coach. You have full access to the user's workout history shown below. Give specific, data-driven advice. When suggesting progressive overload, reference their actual numbers. Keep responses concise but actionable (2-4 short paragraphs max). Use the data to make personalized recommendations.\n\n"+workoutCtx;
  var messages=chatHistory.slice(-10);

  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",
      max_tokens:1000,
      system:systemPrompt,
      messages:messages
    })
  }).then(function(res){return res.json()}).then(function(data){
    var reply=(data.content&&data.content[0]&&data.content[0].text)||"Sorry, I couldn't get a response. Please try again.";
    thinkBubble.classList.remove("thinking");thinkBubble.textContent=reply;
    chatHistory.push({role:"assistant",content:reply});
    document.getElementById("chatMessages").scrollTop=document.getElementById("chatMessages").scrollHeight;
  }).catch(function(e){
    thinkBubble.classList.remove("thinking");thinkBubble.textContent="Connection error. Make sure you're online and try again.";
  }).finally(function(){sendBtn.disabled=false});
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildHome();
</script>
